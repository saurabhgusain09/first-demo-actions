name: my_first_action

on:
  push:
    branches: main
    paths:
      - '*.js'

jobs:
    test:
        runs-on: ubuntu-slim
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: installing dependencies
              uses: actions/setup-node@v6
              with:
                node-version: '22.22.3'
            - name: install dependencies
              run: npm install
            - name: run tests cases
              run: npm test
            
    build:
        needs: test
        runs-on: ubuntu-slim
        steps:
            - name: checkout code
              uses: actions/checkout@v6
            - name: installing dependencies
              uses: actions/setup-node@v6
              with:
                node-version: '22.22.3'
            - name: install dependencies
              run: npm install

            - name: build app
              run: npm run build